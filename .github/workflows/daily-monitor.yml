name: Daily Tech Market Monitor

on:
  schedule:
    # 08:00 KST = 23:00 UTC (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  daily-monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the daily report back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist the SQLite database between runs so monthly reports work
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/monitor.db
          key: monitor-db-${{ github.run_number }}
          restore-keys: |
            monitor-db-

      - name: Create required directories
        run: mkdir -p data output/daily output/logs

      - name: Run daily monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.main daily --date "${{ github.event.inputs.date }}"
          else
            python -m src.main daily
          fi

      - name: Commit daily report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/daily/
          git diff --staged --quiet && echo "No new report to commit." || \
            git commit -m "report: daily $(date -u +%Y-%m-%d)" && git push
