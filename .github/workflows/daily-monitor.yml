name: Daily Tech Market Monitor

on:
  schedule:
    # 08:00 KST = 23:00 UTC (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: repo-push
  cancel-in-progress: false

jobs:
  daily-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p data output/daily output/monthly output/logs

      - name: Run daily monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.main daily --date "${{ github.event.inputs.date }}"
          else
            python -m src.main daily
          fi

      - name: List generated files
        run: |
          echo "=== output/daily ==="
          ls -la output/daily/ || true
          echo "=== data ==="
          ls -la data/ || true

      - name: Commit daily report and database to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A output/daily/*.md data/monitor.db 2>/dev/null || true
          git add output/daily/ data/monitor.db
          if git diff --staged --quiet; then
            echo "No new report to commit."
            exit 0
          fi
          git commit -m "report: daily $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin HEAD:main
